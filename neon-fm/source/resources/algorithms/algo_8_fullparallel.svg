<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#50c878"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="200" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#4a9fff">Full Parallel</text>
  
  <!-- Operator 1 (Carrier) -->
  <rect x="50" y="100" width="80" height="60" rx="8" fill="#50c878" stroke="#50c878" stroke-width="2"/>
  <text x="90" y="135" font-size="28" font-weight="bold" text-anchor="middle" fill="white">1</text>
  
  <!-- Operator 2 (Carrier) -->
  <rect x="160" y="100" width="80" height="60" rx="8" fill="#50c878" stroke="#50c878" stroke-width="2"/>
  <text x="200" y="135" font-size="28" font-weight="bold" text-anchor="middle" fill="white">2</text>
  
  <!-- Operator 3 (Carrier) -->
  <rect x="270" y="100" width="80" height="60" rx="8" fill="#50c878" stroke="#50c878" stroke-width="2"/>
  <text x="310" y="135" font-size="28" font-weight="bold" text-anchor="middle" fill="white">3</text>
  
  <!-- Operator 4 (Carrier) -->
  <rect x="105" y="220" width="190" height="60" rx="8" fill="#50c878" stroke="#50c878" stroke-width="2"/>
  <text x="200" y="255" font-size="28" font-weight="bold" text-anchor="middle" fill="white">4</text>
  
  <!-- Arrows to OUT -->
  <line x1="90" y1="160" x2="150" y2="220" stroke="#50c878" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="160" x2="200" y2="220" stroke="#50c878" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="310" y1="160" x2="250" y2="220" stroke="#50c878" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow to OUT -->
  <line x1="200" y1="280" x2="200" y2="320" stroke="#50c878" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- OUT label -->
  <text x="200" y="350" font-size="14" text-anchor="middle" fill="#888">OUT</text>
  
  <!-- Legend -->
  <rect x="20" y="450" width="12" height="12" rx="2" fill="#50c878"/>
  <text x="38" y="460" font-size="12" fill="#666">All Carriers (Additive)</text>
</svg>
