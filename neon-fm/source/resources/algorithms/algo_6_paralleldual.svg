<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a9fff"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="200" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#4a9fff">Parallel Dual</text>
  
  <!-- Operator 1 -->
  <rect x="80" y="70" width="100" height="60" rx="8" fill="#4a90e2" stroke="#4a90e2" stroke-width="2"/>
  <text x="130" y="105" font-size="28" font-weight="bold" text-anchor="middle" fill="white">1</text>
  
  <!-- Arrow 1→2 -->
  <line x1="130" y1="130" x2="130" y2="160" stroke="#4a9fff" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Operator 2 (Carrier) -->
  <rect x="80" y="160" width="100" height="60" rx="8" fill="#50c878" stroke="#50c878" stroke-width="2"/>
  <text x="130" y="195" font-size="28" font-weight="bold" text-anchor="middle" fill="white">2</text>
  
  <!-- Operator 3 (Carrier) -->
  <rect x="250" y="70" width="100" height="60" rx="8" fill="#50c878" stroke="#50c878" stroke-width="2"/>
  <text x="300" y="105" font-size="28" font-weight="bold" text-anchor="middle" fill="white">3</text>
  
  <!-- Operator 4 (Carrier) -->
  <rect x="250" y="160" width="100" height="60" rx="8" fill="#50c878" stroke="#50c878" stroke-width="2"/>
  <text x="300" y="195" font-size="28" font-weight="bold" text-anchor="middle" fill="white">4</text>
  
  <!-- Arrows to OUT -->
  <line x1="130" y1="220" x2="130" y2="260" stroke="#50c878" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="130" x2="300" y2="260" stroke="#50c878" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="220" x2="300" y2="260" stroke="#50c878" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Merge to center -->
  <path d="M 130 260 L 215 290 L 300 260" fill="none" stroke="#50c878" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- OUT label -->
  <text x="215" y="330" font-size="14" text-anchor="middle" fill="#888">OUT</text>
  
  <!-- Legend -->
  <rect x="20" y="450" width="12" height="12" rx="2" fill="#4a90e2"/>
  <text x="38" y="460" font-size="12" fill="#666">Modulator</text>
  
  <rect x="200" y="450" width="12" height="12" rx="2" fill="#50c878"/>
  <text x="218" y="460" font-size="12" fill="#666">Carrier</text>
</svg>
