<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a9fff"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="200" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#4a9fff">Serial Chain</text>
  
  <!-- Operator 1 -->
  <rect x="150" y="70" width="100" height="60" rx="8" fill="#4a90e2" stroke="#4a90e2" stroke-width="2"/>
  <text x="200" y="105" font-size="28" font-weight="bold" text-anchor="middle" fill="white">1</text>
  
  <!-- Arrow 1→2 -->
  <line x1="200" y1="130" x2="200" y2="160" stroke="#4a9fff" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Operator 2 -->
  <rect x="150" y="160" width="100" height="60" rx="8" fill="#4a90e2" stroke="#4a90e2" stroke-width="2"/>
  <text x="200" y="195" font-size="28" font-weight="bold" text-anchor="middle" fill="white">2</text>
  
  <!-- Arrow 2→3 -->
  <line x1="200" y1="220" x2="200" y2="250" stroke="#4a9fff" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Operator 3 -->
  <rect x="150" y="250" width="100" height="60" rx="8" fill="#4a90e2" stroke="#4a90e2" stroke-width="2"/>
  <text x="200" y="285" font-size="28" font-weight="bold" text-anchor="middle" fill="white">3</text>
  
  <!-- Arrow 3→4 -->
  <line x1="200" y1="310" x2="200" y2="340" stroke="#4a9fff" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Operator 4 (Carrier) -->
  <rect x="150" y="340" width="100" height="60" rx="8" fill="#50c878" stroke="#50c878" stroke-width="2"/>
  <text x="200" y="375" font-size="28" font-weight="bold" text-anchor="middle" fill="white">4</text>
  
  <!-- Arrow to OUT -->
  <line x1="200" y1="400" x2="200" y2="430" stroke="#50c878" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- OUT label -->
  <text x="200" y="455" font-size="14" text-anchor="middle" fill="#888">OUT</text>
  
  <!-- Legend -->
  <rect x="20" y="450" width="12" height="12" rx="2" fill="#4a90e2"/>
  <text x="38" y="460" font-size="12" fill="#666">Modulator</text>
  
  <rect x="200" y="450" width="12" height="12" rx="2" fill="#50c878"/>
  <text x="218" y="460" font-size="12" fill="#666">Carrier</text>
</svg>
