name: Build Synth

on:
  workflow_call:
    inputs:
      synth:
        description: 'Synth project name (e.g., neon-777, neon-jr)'
        required: true
        type: string

jobs:
  build:
    name: Build ${{ inputs.synth }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: PC
          - os: macos-latest
            platform: Mac
          - os: ubuntu-latest
            platform: Android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch JUCE
        run: |
          git clone --depth 1 https://github.com/juce-framework/JUCE.git JUCE

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: ${{ matrix.platform == 'Android' && '~3.28.0' || 'latest' }}

      - name: Install Linux Dependencies (Android/Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libasound2-dev libcurl4-openssl-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Setup Android NDK (Android)
        if: matrix.platform == 'Android'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Set NDK Environment (Android)
        if: matrix.platform == 'Android'
        shell: bash
        run: |
          sdk_root="$(dirname "$(dirname "${{ steps.setup-ndk.outputs.ndk-path }}")")"
          echo "ANDROID_HOME=$sdk_root" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$sdk_root" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Setup Java (Android)
        if: matrix.platform == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build ${{ inputs.synth }}
        shell: pwsh
        run: |
          if ("${{ matrix.platform }}" -eq "Android") {
            ./build-android.ps1 -Synth ${{ inputs.synth }} -Config Release
          } else {
            ./build.ps1 -Synth ${{ inputs.synth }} -Config Release
          }

      - name: Validate macOS AU (auval)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -e
          SYNTH_NAME="${{ inputs.synth }}"
          # Convert synth name to plugin code (e.g., neon-777 -> Ne77, neon-jr -> NeJr)
          PLUGIN_CODE=$(echo "$SYNTH_NAME" | sed 's/neon-\(.\).*\(.\)/Ne\U\1\2/g')
          AU_BUNDLE=$(find artifacts/$SYNTH_NAME/AU -name "*.component" -maxdepth 2 | head -n 1)
          if [ -z "$AU_BUNDLE" ]; then
            echo "ERROR: No .component AU bundle was produced."
            exit 1
          fi
          echo "Found AU bundle: $AU_BUNDLE"
          mkdir -p "$HOME/Library/Audio/Plug-Ins/Components"
          cp -R "$AU_BUNDLE" "$HOME/Library/Audio/Plug-Ins/Components/"
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          auval -a | grep -i "$PLUGIN_CODE" || true
          auval -v aumu "$PLUGIN_CODE" NeAu || true

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          $SYNTH = "${{ inputs.synth }}"
          mkdir out

          if ("${{ matrix.platform }}" -eq "PC") {
              mkdir dist-pc
              Copy-Item -Path "artifacts/$SYNTH/Standalone/*.exe" -Destination dist-pc/
              Copy-Item -Path "artifacts/$SYNTH/VST3" -Destination dist-pc/ -Recurse
              if (Test-Path "artifacts/$SYNTH/waves-1") {
                  Copy-Item -Path "artifacts/$SYNTH/waves-1" -Destination dist-pc/ -Recurse
              }
              $ZIP_NAME = "$SYNTH-PC".Replace('-', '_').ToUpper() + ".zip"
              Compress-Archive -Path dist-pc/* -DestinationPath $ZIP_NAME
          }
          elseif ("${{ matrix.platform }}" -eq "Mac") {
              mkdir dist-mac
              $APP_NAME = (Get-ChildItem -Path "artifacts/$SYNTH/Standalone" -Filter "*.app" -ErrorAction SilentlyContinue | Select-Object -First 1).Name
              if ($APP_NAME) {
                  Copy-Item -Path "artifacts/$SYNTH/Standalone/$APP_NAME" -Destination dist-mac/ -Recurse
              }
              Copy-Item -Path "artifacts/$SYNTH/VST3" -Destination dist-mac/ -Recurse
              if (Test-Path "artifacts/$SYNTH/AU") {
                  Copy-Item -Path "artifacts/$SYNTH/AU" -Destination dist-mac/ -Recurse
              }
              if (Test-Path "artifacts/$SYNTH/waves-1") {
                  Copy-Item -Path "artifacts/$SYNTH/waves-1" -Destination dist-mac/ -Recurse
              }
          }
          elseif ("${{ matrix.platform }}" -eq "Android") {
              mkdir dist-android
              if (Test-Path "artifacts/$SYNTH/Android") {
                  Copy-Item -Path "artifacts/$SYNTH/Android/*.apk" -Destination dist-android/ -ErrorAction SilentlyContinue
                  if (Test-Path "artifacts/$SYNTH/Android/libs") {
                      Copy-Item -Path "artifacts/$SYNTH/Android/libs/*.so" -Destination dist-android/ -ErrorAction SilentlyContinue
                  }
              }
              $ZIP_NAME = "$SYNTH-Android".Replace('-', '_').ToUpper() + ".zip"
              Compress-Archive -Path dist-android/* -DestinationPath $ZIP_NAME
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.synth }}-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            ${{ matrix.platform == 'PC' && format('{0}_PC.zip', inputs.synth) || '' }}
            ${{ matrix.platform == 'Mac' && 'dist-mac/' || '' }}
            ${{ matrix.platform == 'Android' && format('{0}_Android.zip', inputs.synth) || '' }}
